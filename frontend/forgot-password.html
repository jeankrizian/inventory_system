<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Cavite Institute Property Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/cavite-institute-logo.png" alt="Cavite Institute" class="logo-icon">
        <h1 class="system-brand-name system-brand-login">
          <span>CAVITE INSTITUTE</span>
          <span>PROPERTY MANAGEMENT</span>
          <span>SYSTEM</span>
        </h1>
        <p>Reset your password</p>
      </div>
      <form id="forgotPasswordForm" novalidate>
        <div class="form-group">
          <label for="email">School Email *</label>
          <input type="email" class="form-control-custom" id="email" name="email"
                 placeholder="juandelacruz@caviteinstitute.edu.ph" autocomplete="email" required>
          <div class="field-hint">Only @caviteinstitute.edu.ph addresses are allowed.</div>
          <div class="field-error" id="emailError" style="display:none;"></div>
        </div>
        <div id="forgotError" class="login-error" role="alert" style="display:none;"></div>
        <div id="forgotSuccess" class="login-success" role="status" style="display:none;"></div>
        <button type="submit" class="btn-primary-custom btn-login" id="forgotBtn">
          <i class="bi bi-envelope"></i> Continue
        </button>
        <div class="login-links login-links-single">
          <a href="/index.html">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
