<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Requests - Cavite Institute Property Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="app-wrapper" id="app"></div>

  <div class="modal-overlay" id="submitModal">
    <div class="modal-content-custom" style="max-width:720px;">
      <div class="modal-header-custom">
        <h3>Maintenance Request</h3>
        <button class="btn-icon" title="Close" aria-label="Close" onclick="closeModal('submitModal')"><i class="bi bi-x-lg"></i></button>
      </div>
      <form id="submitForm">
        <div class="modal-body-custom">
          <div class="form-group"><label>Asset *</label>
            <select class="form-control-custom" id="submitAssetId" required>
              <option value="">Select asset...</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Property Tag</label><input type="text" class="form-control-custom" id="submitPropertyTag" readonly></div>
            <div class="form-group"><label>Department</label><input type="text" class="form-control-custom" id="submitDepartment" readonly></div>
          </div>
          <div class="form-group"><label>Current Location</label><input type="text" class="form-control-custom" id="submitLocation" readonly></div>
          <div class="form-group"><label>Reported Problem *</label><textarea class="form-control-custom" id="submitProblem" rows="2" required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Maintenance Type *</label>
              <select class="form-control-custom" id="submitType" required>
                <option value="Preventive">Preventive</option>
                <option value="Corrective">Corrective</option>
                <option value="Emergency">Emergency</option>
              </select>
            </div>
            <div class="form-group"><label>Priority *</label>
              <select class="form-control-custom" id="submitPriority" required>
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Scheduled Maintenance Date *</label><input type="date" class="form-control-custom" id="submitDate" required></div>
            <div class="form-group"><label>Requested Date</label><input type="date" class="form-control-custom" id="submitRequestedDate" readonly></div>
          </div>
          <div class="form-group"><label>Notes</label><textarea class="form-control-custom" id="submitNotes" rows="2"></textarea></div>
        </div>
        <div class="modal-footer-custom">
          <button type="button" class="btn-outline-custom" onclick="closeModal('submitModal')">Cancel</button>
          <button type="submit" class="btn-primary-custom">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-content-custom" style="max-width:560px;">
      <div class="modal-header-custom">
        <h3 id="actionModalTitle">Action</h3>
        <button class="btn-icon" title="Close" aria-label="Close" onclick="closeModal('actionModal')"><i class="bi bi-x-lg"></i></button>
      </div>
      <form id="actionForm" data-local-handler="1">
        <div class="modal-body-custom" id="actionModalBody"></div>
        <div class="modal-footer-custom">
          <button type="button" class="btn-outline-custom" onclick="closeModal('actionModal')">Cancel</button>
          <button type="submit" class="btn-primary-custom" id="actionModalSubmit">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/submitGuard.js"></script>
  <script src="/js/actionMenu.js"></script>
  <script src="/js/tableScroll.js"></script>
  <script src="/js/detailModal.js"></script>
  <script src="/js/components/layout.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/assetClassification.js"></script>
  <script src="/js/searchableSelect.js"></script>
  <script src="/js/requestApprovals.js"></script>
  <script src="/js/pages/maintenance-requests.js"></script>
</body>
</html>
