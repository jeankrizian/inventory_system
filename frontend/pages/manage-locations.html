<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locations - Cavite Institute Property Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="app-wrapper" id="app"></div>

  <div class="modal-overlay" id="locationModal">
    <div class="modal-content-custom">
      <div class="modal-header-custom">
        <h3 id="locationModalTitle">Add Location</h3>
        <button class="btn-icon" title="Close" aria-label="Close" onclick="closeModal('locationModal')"><i class="bi bi-x-lg"></i></button>
      </div>
      <form id="locationForm">
        <div class="modal-body-custom">
          <input type="hidden" id="locationId">
          <div class="form-group"><label>Location Name *</label><input type="text" class="form-control-custom" id="locationName" required></div>
          <div class="form-group"><label>Description</label><textarea class="form-control-custom" id="locationDesc" rows="3"></textarea></div>
        </div>
        <div class="modal-footer-custom">
          <button type="button" class="btn-outline-custom" onclick="closeModal('locationModal')">Cancel</button>
          <button type="submit" class="btn-primary-custom">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components/layout.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/pages/manage-locations.js"></script>
</body>
</html>
