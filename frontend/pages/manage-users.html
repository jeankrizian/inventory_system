<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Cavite Institute Property Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="app-wrapper" id="app"></div>

  <div class="modal-overlay" id="userModal">
    <div class="modal-content-custom">
      <div class="modal-header-custom">
        <h3 id="userModalTitle">Add User</h3>
        <button class="btn-icon" title="Close" aria-label="Close" onclick="closeModal('userModal')"><i class="bi bi-x-lg"></i></button>
      </div>
      <form id="userForm">
        <div class="modal-body-custom">
          <input type="hidden" id="userId">
          <div class="form-group"><label>Full Name *</label><input type="text" class="form-control-custom" id="userFullName" required></div>
          <div class="form-row">
            <div class="form-group"><label>Username *</label><input type="text" class="form-control-custom" id="userUsername" required></div>
            <div class="form-group"><label>Email *</label><input type="email" class="form-control-custom" id="userEmail" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Role *</label><select class="form-control-custom" id="userRole" required></select></div>
            <div class="form-group"><label>Status</label>
              <select class="form-control-custom" id="userStatus">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-row" id="assignmentFields" style="display:none;">
            <div class="form-group" id="departmentAssignmentGroup" style="display:none;">
              <label id="departmentAssignmentLabel">Assigned Department</label>
              <select class="form-control-custom" id="userAssignedDepartment">
                <option value="">Select department...</option>
              </select>
            </div>
            <div class="form-group" id="locationAssignmentGroup" style="display:none;">
              <label id="locationAssignmentLabel">Assigned Laboratory</label>
              <select class="form-control-custom" id="userAssignedLocation">
                <option value="">Select laboratory...</option>
              </select>
            </div>
          </div>
          <div class="form-group" id="passwordGroup">
            <label id="passwordLabel">Password *</label>
            <input type="password" class="form-control-custom" id="userPassword" minlength="8" autocomplete="new-password">
            <small id="passwordHint" style="display:none;color:#666;font-size:12px;">Leave blank to keep the current password.</small>
          </div>
        </div>
        <div class="modal-footer-custom">
          <button type="button" class="btn-outline-custom" onclick="closeModal('userModal')">Cancel</button>
          <button type="submit" class="btn-primary-custom">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components/layout.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/pages/manage-users.js"></script>
</body>
</html>
