<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Cavite Institute Property Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/login-background.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="login-page login-page--institutional-bg">
    <div class="login-card login-card-wide">
      <div class="login-logo">
        <img src="/images/cavite-institute-logo.png" alt="Cavite Institute" class="logo-icon">
        <h1 class="system-brand-name system-brand-login">
          <span>CAVITE INSTITUTE</span>
          <span>PROPERTY MANAGEMENT</span>
          <span>SYSTEM</span>
        </h1>
        <p>Create your account</p>
      </div>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" class="form-control-custom" id="fullName" name="fullName"
                 placeholder="Enter your full name" autocomplete="name" required>
          <div class="field-error" id="fullNameError" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" class="form-control-custom" id="username" name="username"
                 placeholder="Enter username" autocomplete="username" required maxlength="30">
          <div class="field-hint">4–30 characters. Letters, numbers, underscores, and periods only.</div>
          <div class="field-error" id="usernameError" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" class="form-control-custom" id="email" name="email"
                 placeholder="juandelacruz@caviteinstitute.edu.ph" autocomplete="email" required>
          <div class="field-hint">Only @caviteinstitute.edu.ph addresses are allowed.</div>
          <div class="field-error" id="emailError" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <div class="password-field-wrap">
            <input type="password" class="form-control-custom" id="password" name="password"
                   placeholder="Minimum 8 characters" autocomplete="new-password" required minlength="8">
            <button type="button" class="password-toggle-btn" data-target="password" aria-label="Show password" aria-pressed="false">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="field-error" id="passwordError" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <div class="password-field-wrap">
            <input type="password" class="form-control-custom" id="confirmPassword" name="confirmPassword"
                   placeholder="Re-enter password" autocomplete="new-password" required minlength="8">
            <button type="button" class="password-toggle-btn" data-target="confirmPassword" aria-label="Show password" aria-pressed="false">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="field-error" id="confirmPasswordError" style="display:none;"></div>
        </div>
        <div id="registerError" class="login-error" role="alert" style="display:none;"></div>
        <div id="registerSuccess" class="login-success" role="status" style="display:none;"></div>
        <button type="submit" class="btn-primary-custom btn-login" id="registerBtn">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
        <div class="login-links login-links-single">
          <a href="/index.html">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
